<!DOCTYPE html>
<html>

<head>
    <title>Capture Region</title>
    <link rel="icon" type="image/png" href="icons/icon48.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvas-container {
            position: relative;
            flex: 1;
            overflow: auto;
            cursor: crosshair;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #000;
            padding: 20px;
            box-sizing: border-box;
        }

        #wrapper {
            position: relative;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            font-size: 0;
        }

        #snapshot {
            display: block;
            max-width: 100%;
            height: auto;
        }

        #selection-box {
            position: absolute;
            border: 2px dashed #22d3ee;
            background: rgba(34, 211, 238, 0.2);
            display: none;
            pointer-events: none;
            z-index: 10;
            touch-action: none;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.9);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
        }

        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: none;
            color: white;
            padding: 40px;
            box-sizing: border-box;
            overflow: auto;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .result-content {
            max-width: 800px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            position: relative;
        }

        h2 {
            margin-top: 0;
            color: #22d3ee;
        }

        pre {
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            color: #e5e7eb;
            border: 1px solid #4b5563;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
            color: #9ca3af;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #6366f1;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Hide sandbox */
        iframe {
            display: none;
            width: 0;
            height: 0;
        }
    </style>
</head>

<body>
    <div id="canvas-container">
        <div id="wrapper">
            <canvas id="snapshot"></canvas>
            <div id="selection-box"></div>
        </div>
    </div>

    <div id="controls">
        <span id="status">Draw a box around text to capture...</span>
        <button id="btnProcess" disabled>
            <span class="spinner" id="btnSpinner"></span>
            Extract Text
        </button>
    </div>

    <div id="result-overlay">
        <div class="result-content">
            <span class="close-btn" id="btnCloseResult">&times;</span>
            <h2>Extracted Text</h2>
            <pre id="text-output">Wait...</pre>
            <button id="btnCopy">Copy to Clipboard</button>
        </div>
    </div>

    <!-- Sandboxed iframe for OCR -->
    <iframe id="ocr-sandbox" src="ocr-sandbox.html"></iframe>

    <!-- Removed direct JS. Logic handles via iframe -->
    <!-- <script src="lib/tesseract.min.js"></script> -->
    <script src="capture.js"></script>
</body>

</html>
