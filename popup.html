<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Text Copier Tool</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Text Copier</h1>
      <p class="subtitle">Extract text from anything</p>
    </div>

    <div class="controls">
      <div class="action-card">
        <label class="switch">
          <input type="checkbox" id="copyToggle">
          <span class="slider round"></span>
        </label>
        <div class="card-text">
          <h3>Unlock Text Selection</h3>
          <p>Remove copy restrictions.</p>
        </div>
      </div>

      <button id="btnCapture" class="primary-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
          </path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z">
          </path>
        </svg>
        <span>Extract Video Text</span>
      </button>

      <button id="btnStop" class="secondary-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span>Stop/Pause Page</span>
      </button>
    </div>

    <div class="footer">
      Made by Amall
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
